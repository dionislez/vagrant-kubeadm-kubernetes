---
apiVersion: v1
kind: Service
metadata:
  name: test-st
  labels:
    app.kubernetes.io/name: test-st
    app.kubernetes.io/instance: test-st
    app.kubernetes.io/version: v0.0.1
spec:
  selector:
    app.kubernetes.io/name: test-st
    app.kubernetes.io/instance: test-st
    app.kubernetes.io/version: v0.0.1
  ports:
    -
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: test-st-headless
  labels:
    app.kubernetes.io/name: test-st
    app.kubernetes.io/instance: test-st
    app.kubernetes.io/version: v0.0.1
spec:
  selector:
    app.kubernetes.io/name: test-st
    app.kubernetes.io/instance: test-st
    app.kubernetes.io/version: v0.0.1
  clusterIP: None
  ports:
    -
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-st
  labels:
    app.kubernetes.io/name: test-st
    app.kubernetes.io/instance: test-st
    app.kubernetes.io/version: v0.0.1
spec:
  serviceName: test-st-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: test-st
      app.kubernetes.io/instance: test-st
      app.kubernetes.io/version: v0.0.1
  template:
    metadata:
      name: test-st
      labels:
        app.kubernetes.io/name: test-st
        app.kubernetes.io/instance: test-st
        app.kubernetes.io/version: v0.0.1
    spec:
      containers:
        -
          name: whoami
          image: traefik/whoami
          ports:
            -
              containerPort: 80
              protocol: TCP
              name: http
          resources:
            limits:
              cpu: 100m
              memory: 100Mi
            requests:
              cpu: 100m
              memory: 100Mi
  replicas: 3
